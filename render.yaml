services:
  - type: web
    name: deena-kiran-portfolio
    runtime: static
    buildCommand: "true"
    staticPublishPath: portfolio
    autoDeployTrigger: commit
    headers:
      - path: /*
        name: X-Frame-Options
        value: sameorigin
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
